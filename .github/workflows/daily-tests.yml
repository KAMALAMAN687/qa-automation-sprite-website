name: Sprite Daily Smoke Tests

on:
  # ── Run every day at 9:00 AM IST (3:30 AM UTC) ──────────────────────────────
  schedule:
    - cron: '30 3 * * *'

  # ── Also allow manual trigger from GitHub UI ─────────────────────────────────
  workflow_dispatch:
    inputs:
      send_email:
        description: 'Send email report after run?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  smoke-tests:
    name: Run Smoke Tests & Send Report
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ───────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Install Playwright browsers (Chrome only) ──────────────────────
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # ── 5. Restore auth session from GitHub Secret ─────────────────────────
      #    AUTH_SESSION secret = base64-encoded contents of playwright/.auth/user.json
      - name: Restore auth session
        run: |
          mkdir -p playwright/.auth
          echo "${{ secrets.AUTH_SESSION }}" | base64 --decode > playwright/.auth/user.json
          echo "✅ Auth session restored"

      # ── 6. Create .env file from secrets ──────────────────────────────────
      - name: Create .env
        run: |
          cat > .env << EOF
          BASE_URL=https://sprite-joke-in-a-bottle.coke2home.com
          API_URL=https://sprite-joke-in-a-bottle.coke2home.com/api
          EMAIL_FROM=${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO=${{ secrets.EMAIL_TO }}
          EOF

      # ── 7. Create reports directories ─────────────────────────────────────
      - name: Create report directories
        run: mkdir -p reports/screenshots reports/summary reports/test-results reports/html

      # ── 8. Run all phase3 smoke tests ─────────────────────────────────────
      - name: Run phase3 authenticated tests
        run: npx playwright test --project=phase3-authenticated
        continue-on-error: true   # generate report even if tests fail

      # ── 9. Generate HTML smoke report ─────────────────────────────────────
      - name: Generate smoke test report
        run: node scripts/generate-report.js

      # ── 10. Send email report ─────────────────────────────────────────────
      - name: Send email report
        if: ${{ github.event.inputs.send_email != 'false' }}
        run: node scripts/send-email.js
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      # ── 11. Upload artifacts (report + screenshots + videos) ───────────────
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-report-${{ github.run_number }}
          path: |
            reports/summary/report.html
            reports/summary/report.json
            reports/screenshots/
            reports/html/
          retention-days: 30

      - name: Upload test videos & traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-recordings-${{ github.run_number }}
          path: reports/test-results/
          retention-days: 7

      # ── 12. Print summary in GitHub Actions UI ────────────────────────────
      - name: Print result summary
        if: always()
        run: |
          echo "## 🧪 Sprite Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/summary/report.json ]; then
            node -e "
              const r = require('./reports/summary/report.json');
              console.log('| Metric | Value |');
              console.log('|--------|-------|');
              console.log('| **Total** | ' + r.total + ' |');
              console.log('| ✅ Passed | ' + r.totalPassed + ' |');
              console.log('| ❌ Failed | ' + r.totalFailed + ' |');
              console.log('| ⏭️ Skipped | ' + r.totalSkipped + ' |');
              console.log('| **Pass Rate** | ' + r.passRate + '% |');
              if (r.totalFailed > 0) {
                console.log('');
                console.log('### ❌ Failed Tests');
                r.pages.forEach(p => p.failures.forEach(f => {
                  console.log('- [' + p.page + '] ' + f.title);
                }));
              }
            " >> $GITHUB_STEP_SUMMARY
          fi
