name: Sprite Daily Smoke Tests

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      send_email:
        description: 'Send email report after run?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

jobs:
  smoke-tests:
    name: Run Smoke Tests & Send Report
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Restore auth session
        run: |
          mkdir -p playwright/.auth
          echo "${{ secrets.AUTH_SESSION }}" | base64 --decode > playwright/.auth/user.json
          echo "Auth session restored"

      - name: Create .env
        run: |
          cat > .env << EOF
          BASE_URL=https://sprite-joke-in-a-bottle.coke2home.com
          API_URL=https://sprite-joke-in-a-bottle.coke2home.com/api
          EMAIL_FROM=${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO=${{ secrets.EMAIL_TO }}
          EOF

      - name: Create report directories
        run: mkdir -p reports/screenshots reports/summary reports/test-results reports/html

      - name: Run phase3 authenticated tests
        run: npx playwright test --project=phase3-authenticated
        continue-on-error: true

      - name: Generate smoke test report
        run: node scripts/generate-report.js

      - name: Send email report
        if: ${{ github.event.inputs.send_email != 'false' }}
        run: node scripts/send-email.js
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-report-${{ github.run_number }}
          path: |
            reports/summary/report.html
            reports/summary/report.json
            reports/screenshots/
            reports/html/
          retention-days: 30

      - name: Upload test videos and traces
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-recordings-${{ github.run_number }}
          path: reports/test-results/
          retention-days: 7
